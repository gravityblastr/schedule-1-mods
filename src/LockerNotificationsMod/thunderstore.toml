[config]
schemaVersion = "0.0.1"

[package]
namespace = "gravityblastr"
name = "LockerNotificationsMod"
versionNumber = "0.0.1"
description = "Get a message from Manny when one of your employee lockers won't have enough for the next day's pay."
websiteUrl = "https://github.com/gravityblastr/schedule-1-mods"
containsNsfwContent = false

[package.dependencies]
"LavaGang-MelonLoader" = "0.6.6"
"the_croods-SwapperPlugin" = "1.2.2"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "../../.work/thunderstore"

[[build.copy]]
source = "./bin/Release/net6.0/GravityBlastr.LockerNotificationsMod.dll"
target = "IL2CPP/GravityBlastr.LockerNotificationsMod.IL2CPP.dll"

[[build.copy]]
source = "./bin/Release/netstandard2.1/GravityBlastr.LockerNotificationsMod.dll"
target = "Mono/GravityBlastr.LockerNotificationsMod.Mono.dll"

[publish]
repository = "https://thunderstore.io"
communities = ["schedule-i"]
categories = ["mods", "il2cpp", "mono"]

