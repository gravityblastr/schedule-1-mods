[config]
schemaVersion = "0.0.1"

[package]
namespace = "GravityBlastr"
name = "PrefsPersistMod"
versionNumber = "0.0.1"
description = "Fixes settings not persisting between launches on certain system locales, when using the Mono/alternate branch of the game."
websiteUrl = "https://github.com/gravityblastr/schedule-1-mods"
containsNsfwContent = false

[package.dependencies]
"LavaGang-MelonLoader" = "0.6.6"
"the_croods-SwapperPlugin" = "1.2.2"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "../../.work/thunderstore"

[[build.copy]]
source = "./bin/Release/net6.0/GravityBlastr.PrefsPersistMod.dll"
target = "IL2CPP/GravityBlastr.PrefsPersistMod.IL2CPP.dll"

[[build.copy]]
source = "./bin/Release/netstandard2.1/GravityBlastr.PrefsPersistMod.dll"
target = "Mono/GravityBlastr.PrefsPersistMod.Mono.dll"

[publish]
repository = "https://thunderstore.io"
communities = ["schedule-i"]
categories = ["Mods", "Mono", "IL2CPP"]

