name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  packages: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Authenticate GitHub Packages NuGet feed
        shell: bash
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/gravityblastr/index.json" \
            --name github \
            --username gravityblastr \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore src/GravityBlastrMods.sln

      - name: Build
        run: dotnet build src/GravityBlastrMods.sln -c Release --no-restore
