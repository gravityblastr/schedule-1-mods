name: Nexus Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.2.3)'
        required: true
        type: string
      mods:
        description: 'Space-separated list of mods to upload (leave blank to auto-detect changed mods)'
        required: false
        type: string

permissions:
  contents: read
  packages: read

# Game-scoped mod IDs from nexusmods.com/schedule1/mods/<id>
env:
  NEXUS_MOD_ID_DeliveryNotificationsMod: "1760"
  NEXUS_MOD_ID_DontPunchRayMod: "1761"
  NEXUS_MOD_ID_IlluminationMod: "1762"
  NEXUS_MOD_ID_LaunderMaxMod: "1763"
  NEXUS_MOD_ID_LaunderScaleMod: "1764"
  NEXUS_MOD_ID_LightPersistMod: "1765"
  NEXUS_MOD_ID_LockerNotificationsMod: "1766"
  NEXUS_MOD_ID_PrefsPersistMod: "1767"
  NEXUS_MOD_ID_SigningFreeMod: "1768"
  NEXUS_MOD_ID_UnpackMod: "1769"

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build src/GravityBlastrMods.sln -c Release

      - name: Determine changed mods and package zips
        run: |
          set -e
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          ALL_MODS="DeliveryNotificationsMod DontPunchRayMod IlluminationMod LaunderMaxMod LaunderScaleMod LightPersistMod LockerNotificationsMod PrefsPersistMod SigningFreeMod UnpackMod"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ] || git diff --name-only "$PREV_TAG"..HEAD | grep -qE '^src/Directory\.(Build|Packages)\.props$'; then
            CHANGED_MODS="$ALL_MODS"
          else
            CHANGED_MODS=$(git diff --name-only "$PREV_TAG"..HEAD \
              | grep -E '^src/[^/]+/.*\.cs$' \
              | cut -d/ -f2 | sort -u | tr '\n' ' ')
          fi

          # Manual mods override takes priority
          if [ -n "${{ github.event.inputs.mods }}" ]; then
            CHANGED_MODS="${{ github.event.inputs.mods }}"
            echo "Using manual mods override: $CHANGED_MODS"
          elif [ -z "$(echo "$CHANGED_MODS" | tr -d '[:space:]')" ]; then
            echo "No mods changed, skipping Nexus publish."
            echo "CHANGED_MODS=" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Changed mods: $CHANGED_MODS"
          echo "CHANGED_MODS=$CHANGED_MODS" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          mkdir -p artifacts
          for mod in $CHANGED_MODS; do
            cp "src/$mod/bin/Release/net6.0/GravityBlastr.$mod.dll" .
            7z a -tzip "artifacts/${mod}-${TAG}-IL2CPP.zip" "GravityBlastr.$mod.dll"
            rm "GravityBlastr.$mod.dll"

            cp "src/$mod/bin/Release/netstandard2.1/GravityBlastr.$mod.dll" .
            7z a -tzip "artifacts/${mod}-${TAG}-Mono.zip" "GravityBlastr.$mod.dll"
            rm "GravityBlastr.$mod.dll"
          done

      - name: Upload to Nexus Mods
        if: env.CHANGED_MODS != ''
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          NEXUS_API="https://api.nexusmods.com/v3"
          GAME_DOMAIN="schedule1"
          FAILED=""

          # nexus_upload <mod> <file_path> <display_name> <game_scoped_id>
          # Returns 0 on success, 1 on failure (does not abort the loop).
          nexus_upload() {
            local MOD="$1"
            local FILE_PATH="$2"
            local DISPLAY_NAME="$3"
            local GAME_SCOPED_ID="$4"

            echo "=== $DISPLAY_NAME ==="

            # Step 1: resolve internal mod UUID
            local MOD_INFO
            MOD_INFO=$(curl --fail-with-body --show-error --no-progress-meter \
              -H "apikey: $NEXUS_API_KEY" \
              "${NEXUS_API}/games/${GAME_DOMAIN}/mods/${GAME_SCOPED_ID}") || { echo "  ERROR: failed to get mod info"; return 1; }
            local MOD_UUID
            MOD_UUID=$(echo "$MOD_INFO" | jq -r '.data.id')
            echo "  mod UUID: $MOD_UUID"

            # Step 2: create upload session
            local FILE_SIZE FILE_NAME UPLOAD_RESP UPLOAD_ID PRESIGNED_URL
            FILE_SIZE=$(stat -c%s "$FILE_PATH")
            FILE_NAME=$(basename "$FILE_PATH")
            UPLOAD_RESP=$(curl --fail-with-body --show-error --no-progress-meter -X POST \
              -H "apikey: $NEXUS_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"size_bytes\": $FILE_SIZE, \"filename\": \"$FILE_NAME\"}" \
              "${NEXUS_API}/uploads") || { echo "  ERROR: failed to create upload session"; return 1; }
            UPLOAD_ID=$(echo "$UPLOAD_RESP" | jq -r '.data.id')
            PRESIGNED_URL=$(echo "$UPLOAD_RESP" | jq -r '.data.presigned_url')
            echo "  upload ID: $UPLOAD_ID"

            # Step 3: PUT to S3 presigned URL (no auth header)
            curl --fail-with-body --show-error --no-progress-meter -X PUT \
              -H "Content-Type: application/octet-stream" \
              --upload-file "$FILE_PATH" \
              "$PRESIGNED_URL" || { echo "  ERROR: S3 upload failed"; return 1; }
            echo "  file uploaded to S3"

            # Step 4: finalise
            local FINALISE_RESP
            FINALISE_RESP=$(curl --fail-with-body --show-error --no-progress-meter -X POST \
              -H "apikey: $NEXUS_API_KEY" \
              "${NEXUS_API}/uploads/${UPLOAD_ID}/finalise") || { echo "  ERROR: finalise failed: $FINALISE_RESP"; return 1; }
            echo "  finalised"

            # Step 5: poll until available
            local UPLOAD_STATE=""
            for i in {1..30}; do
              local POLL_RESP
              POLL_RESP=$(curl --fail-with-body --show-error --no-progress-meter \
                -H "apikey: $NEXUS_API_KEY" \
                "${NEXUS_API}/uploads/${UPLOAD_ID}") || { echo "  ERROR: poll failed"; return 1; }
              UPLOAD_STATE=$(echo "$POLL_RESP" | jq -r '.data.state')
              echo "  attempt $i: state=$UPLOAD_STATE"
              [ "$UPLOAD_STATE" = "available" ] && break
              sleep 3
            done
            if [ "$UPLOAD_STATE" != "available" ]; then
              echo "  ERROR: upload timed out (state=$UPLOAD_STATE)"
              return 1
            fi

            # Step 6: create mod file
            local CREATE_RESP
            CREATE_RESP=$(curl --fail-with-body --show-error --no-progress-meter -X POST \
              -H "apikey: $NEXUS_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"upload_id\":\"$UPLOAD_ID\",\"mod_id\":\"$MOD_UUID\",\"name\":\"$DISPLAY_NAME\",\"version\":\"$VERSION\",\"file_category\":\"main\"}" \
              "${NEXUS_API}/mod-files") || { echo "  ERROR: create mod file failed: $CREATE_RESP"; return 1; }
            local FILE_SCOPED_ID
            FILE_SCOPED_ID=$(echo "$CREATE_RESP" | jq -r '.data.game_scoped_id')
            echo "  created mod file: game_scoped_id=$FILE_SCOPED_ID"
          }

          for mod in $CHANGED_MODS; do
            ID_VAR="NEXUS_MOD_ID_${mod}"
            GAME_SCOPED_ID="${!ID_VAR}"
            if [ -z "$GAME_SCOPED_ID" ]; then
              echo "No Nexus ID configured for $mod, skipping."
              continue
            fi
            nexus_upload "$mod" "artifacts/${mod}-${TAG}-IL2CPP.zip" "${mod} ${VERSION} (IL2CPP)" "$GAME_SCOPED_ID" || FAILED="$FAILED ${mod}(IL2CPP)"
            nexus_upload "$mod" "artifacts/${mod}-${TAG}-Mono.zip" "${mod} ${VERSION} (Mono)" "$GAME_SCOPED_ID" || FAILED="$FAILED ${mod}(Mono)"
          done

          if [ -n "$FAILED" ]; then
            echo ""
            echo "FAILED uploads:$FAILED"
            exit 1
          fi
          echo "All uploads complete."
