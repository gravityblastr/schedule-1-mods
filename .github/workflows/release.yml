name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build src/GravityBlastrMods.sln -c Release

      - name: Package per-mod zips
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MODS="DeliveryNotificationsMod DeliveryPersistMod IlluminationMod LaunderMaxMod LaunderScaleMod LightPersistMod SigningFreeMod DontPunchRayMod PrefsPersistMod LockerNotificationsMod UnpackMod"

          mkdir -p artifacts

          for mod in $MODS; do
            mkdir -p "artifacts/$mod/IL2CPP" "artifacts/$mod/Mono"
            cp "src/$mod/bin/Release/net6.0/$mod.dll" "artifacts/$mod/IL2CPP/"
            cp "src/$mod/bin/Release/netstandard2.1/$mod.dll" "artifacts/$mod/Mono/"
            cd "artifacts/$mod"
            7z a -tzip "../../artifacts/$mod-$TAG.zip" IL2CPP/ Mono/
            cd ../..
          done

      - name: Generate release notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          # Read game version from Directory.Packages.props (e.g. 0.4.4.10 -> 0.4.4f10)
          NUGET_VER=$(grep -oP 'Version="\K[^"]+' src/Directory.Packages.props | head -1)
          GAME_VER=$(echo "$NUGET_VER" | sed 's/\.\([0-9]*\)$/f\1/')

          echo "Built and tested against v${GAME_VER} of the game." > notes.md
          echo "" >> notes.md

          if [ -n "$PREV_TAG" ]; then
            MODS_CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD -- src/ \
              | cut -d/ -f2 | sort -u \
              | grep -vE '^(Directory\.|nuget\.|GravityBlastr)')
            echo "## Changed mods" >> notes.md
            if [ -n "$MODS_CHANGED" ]; then
              for mod in $MODS_CHANGED; do
                echo "- **$mod**" >> notes.md
              done
            else
              echo "- Infrastructure/build changes only" >> notes.md
            fi
            echo "" >> notes.md
            echo "## Commits" >> notes.md
            git log --pretty=format:"- %s" "$PREV_TAG"..HEAD >> notes.md
            echo "" >> notes.md
            echo "" >> notes.md
            echo "**Full changelog**: https://github.com/gravityblastr/schedule-1-mods/compare/${PREV_TAG}...${TAG}" >> notes.md
          else
            echo "## Initial release" >> notes.md
            echo "" >> notes.md
            echo "All mods included:" >> notes.md
            for mod in DeliveryNotificationsMod DeliveryPersistMod DontPunchRayMod IlluminationMod LaunderMaxMod LaunderScaleMod LightPersistMod LockerNotificationsMod PrefsPersistMod SigningFreeMod UnpackMod; do
              echo "- **$mod**" >> notes.md
            done
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*-v*.zip
          body_path: notes.md
